{% extends 'recruitment/base.html' %}

{% block title %}Compose Message - TalentSleuth AI{% endblock %}

{% block content %}
<div class="container" style="margin-top: 2rem; margin-bottom: 3rem;">
    <div class="fade-in">
        <div class="glass-card">
            <h1 style="margin-bottom: 1.5rem;">Compose Message</h1>
            
            {% if messages %}
                {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">Recipient Username</label>
                    <input type="text" name="recipient" class="form-input" required 
                           placeholder="Enter recipient's username">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-input" required 
                           placeholder="Enter message subject">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea name="body" class="form-textarea" rows="8" required 
                              placeholder="Type your message here..."></textarea>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Send Message</button>
                    <a href="{% url 'inbox' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
