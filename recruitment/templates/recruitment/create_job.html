{% extends 'recruitment/base.html' %}

{% block title %}Create Job - TalentSleuth AI{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin-top: 2rem; margin-bottom: 3rem;">
    <div class="glass-card fade-in">
        <h1 style="font-family: var(--font-display); margin-bottom: 2rem;">Create New Job Posting</h1>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Job Title *</label>
                <input type="text" name="title" class="form-input" placeholder="e.g. Senior Software Engineer" required>
            </div>

            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label">Company *</label>
                    <input type="text" name="company" class="form-input" placeholder="Company name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Location *</label>
                    <input type="text" name="location" class="form-input" placeholder="e.g. San Francisco, CA" required>
                </div>
            </div>

            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label">Employment Type *</label>
                    <select name="employment_type" class="form-select" required>
                        <option value="full_time">Full Time</option>
                        <option value="part_time">Part Time</option>
                        <option value="contract">Contract</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Status *</label>
                    <select name="status" class="form-select" required>
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Job Description *</label>
                <textarea name="description" class="form-textarea" rows="6"
                    placeholder="Describe the role, company culture, and what makes this opportunity unique..."
                    required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Requirements *</label>
                <textarea name="requirements" class="form-textarea" rows="6"
                    placeholder="List required qualifications, education, certifications, etc..." required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Responsibilities</label>
                <textarea name="responsibilities" class="form-textarea" rows="5"
                    placeholder="Key responsibilities and day-to-day tasks..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Required Skills (comma-separated) *</label>
                <input type="text" name="required_skills" class="form-input"
                    placeholder="e.g. Python, Django, React, PostgreSQL" required>
                <p class="text-muted" style="margin-top: 0.5rem; font-size: 0.875rem;">
                    These skills will be used by AI to match and score candidates
                </p>
            </div>

            <div class="form-group">
                <label class="form-label">Minimum Years of Experience *</label>
                <input type="number" step="0.5" name="min_experience_years" class="form-input" placeholder="e.g. 3.5"
                    value="0" required>
            </div>

            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label">Minimum Salary (USD)</label>
                    <input type="number" name="salary_min" class="form-input" placeholder="e.g. 80000">
                </div>
                <div class="form-group">
                    <label class="form-label">Maximum Salary (USD)</label>
                    <input type="number" name="salary_max" class="form-input" placeholder="e.g. 120000">
                </div>
            </div>

            <div class="form-group" style="display: flex; gap: 1.5rem; align-items: center; margin: 1rem 0;">
                <label style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" name="fair_pay_badge" value="1">
                    <span>Fair Pay Badge (transparent salary commitment)</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" name="blind_hiring_enabled" value="1">
                    <span>Blind Hiring (hide name, photo, college)</span>
                </label>
            </div>

            <div class="form-group">
                <label class="form-label">Application Deadline</label>
                <input type="date" name="deadline" class="form-input">
            </div>

            <div class="flex gap-2" style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary">Create Job Posting</button>
                <a href="{% url 'recruiter_dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
